name = "webcloud"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ============================================================
# Environment Variables
# Set these in Cloudflare Dashboard for security:
#   Dashboard → Pages → webcloud → Settings → Environment Variables
#
# REQUIRED (Build + Production):
#   NEXT_PUBLIC_CONTENTFUL_SPACE_ID
#   NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN
#
# REQUIRED (Production only — set as Secret):
#   RESEND_API_KEY
#
# OPTIONAL (have defaults):
#   FROM_EMAIL = "info@hovtechautomation.com"
#   TO_EMAIL = "info@hovtechautomation.com"
#   NEXT_PUBLIC_WHATSAPP = "6285733118439"
# ============================================================
